# Cloaq Tunnel Configuration
network:
  # The name of the virtual interface
  interface_name: "cloaq0"

  # Local IP address for the TUN interface (CIDR format)
  # This is the IP your machine will have inside the tunnel
  local_address: "10.0.0.1/24"

  # MTU (Maximum Transmission Unit) - 1500 is standard for Ethernet
  mtu: 1500

tunnel:
  # Port for the Cloaq service to listen on (UDP is better for VPNs)
  listen_port: 8080

  # Enable/disable packet logging in console
  debug_mode: true

# Example for future routing (optional for now)
routes:
  - "192.168.1.0/24"